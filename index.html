<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixlify - PhotoGallery App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>


    <div class="container">


        <div class="navbar">

            <div class="logo">
                <a class="pix" href="index.html">Pixlify</a>
            </div>

            <div class="searchBox">
        
                <input id="search" type="text" placeholder="Search Photos">
                <button>Search</button>
            
            </div>

            <div class="auth-btn">
                <a class="btn" href="login.html">Log in</a>
                <a class="btn" href="register.html">Register</a>
            </div>
        </div>


        <div class="sidebar">


            <button class="side-item">
                  <i data-lucide="compass"></i>
                <span>Explore</span>
            </button>
            <button class="side-item">
                <i data-lucide="bookmark"></i>
                <span>Saved</span>
            </button>
            <button class="side-item">
                 <i data-lucide="user"></i>
                 <span>User</span>
                </button>


            <button class="set">
                <i data-lucide="settings"></i>
                Setting
            </button>
        </div>




        <div class="dashboard">

            
            <div class="categories">
                <button class="pics-btn">Nature</button>
                <button class="pics-btn">Cars</button>
                <button class="pics-btn">Travel</button>
            </div>
            
            <h1>Trending images</h1>


            <div id="imageGrid" class="image-grid">


            </div>

        </div>



    </div>



    <script src="script.js"></script>
    

</body>

</html>
