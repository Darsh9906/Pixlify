<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register To Free Pixlify Account</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="regi-wrapper">


        <div class="regi-container">

            
            <div class="auth-regi">
                <h2>Create Account</h2>

                <div class="email">
                    <p>Email:</p>
                    <input type="text">
                </div>
                <div class="username">
                    <p>Username:</p>
                    <input type="text">
                </div>
                <div class="pass">
                    <p>Password:</p>
                    <input type="password">
                </div>
                <div class="conf-pass">
                    <p>Confirm Password:</p>
                    <input type="password">
                </div>

                <button>Register</button>
            </div>
        </div>



    </div>




<script src="script.js"></script>
</body>

</html>
